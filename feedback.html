<!DOCTYPE html>
<html lang="en" class="result-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Feedback - Nathanieal Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js" type="text/javascript"></script>
    <link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Oswald:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="result-page-body">
    <!-- Animated Orbs Container -->
    <div class="res-orbs">
        <div class="res-orb res-orb-1"></div>
        <div class="res-orb res-orb-2"></div>
        <div class="res-orb res-orb-3"></div>
    </div>
    <div id="particles-container"></div>

    <!-- Sticky Nav -->
    <nav class="res-nav">
        <div class="res-nav-brand">NATHANIEAL <em>/</em> Contact</div>
        <a href="index.html" class="res-back-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            BACK TO PORTFOLIO
        </a>
    </nav>

    <!-- Page Content Wrapper -->
    <div class="res-wrap">
        <!-- Header -->
        <div class="res-header">
            <div class="res-uni-badge">
                <div class="res-uni-dot"></div>
                Let's Work Together
            </div>
            <h1 class="res-title">GET IN TOUCH</h1>
            <p class="res-sub">Have a project in mind, want to give feedback, or just say hi?</p>
            <div class="res-divider"></div>
        </div>

        <!-- Feedback Form Container -->
        <div class="feedback-container animate-on-scroll slide-up delay-100">
            <form action="mailto:nathasandipurti@gmail.com" method="post" enctype="text/plain" class="feedback-form">
                <div class="feedback-grid">
                    <div class="input-group">
                        <label for="name">YOUR NAME</label>
                        <input type="text" id="name" name="Name" required placeholder="John Doe">
                    </div>
                    <div class="input-group">
                        <label for="email">EMAIL ADDRESS</label>
                        <input type="email" id="email" name="Email" required placeholder="john@example.com">
                    </div>
                    <div class="input-group full-width">
                        <label for="subject">SUBJECT</label>
                        <input type="text" id="subject" name="Subject" required placeholder="Game Development Inquiry">
                    </div>
                    <div class="input-group full-width">
                        <label for="message">MESSAGE / FEEDBACK</label>
                        <textarea id="message" name="Message" rows="6" required placeholder="Type your message here..."></textarea>
                    </div>
                </div>
                <div class="submit-wrap">
                    <button type="submit" class="feedback-submit-btn float-hover btn-glow">SEND MESSAGE</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div id="custom-crosshair"></div>

    <script src="script.js"></script>
</body>
</html>
