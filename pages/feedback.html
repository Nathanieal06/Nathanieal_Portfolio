<!DOCTYPE html>
<html lang="en" class="result-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Feedback — Nathanieal Portfolio</title>
    <meta name="description" content="Get in touch with Nathanieal — game developer portfolio contact and feedback form.">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Oswald:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/components.js"></script>
</head>
<body class="result-page-body fb-page" data-page="feedback" data-root="../">

    <!-- Animated Orbs Background -->
    <div class="res-orbs">
        <div class="res-orb res-orb-1"></div>
        <div class="res-orb res-orb-2"></div>
        <div class="res-orb res-orb-3"></div>
    </div>

    <!-- Nav injected by components.js -->
    <div id="site-nav"></div>

    <!-- ── Two-Column Main Content ───────────────────────────── -->
    <main class="fb-main">

        <!-- LEFT: Contact Form -->
        <div class="fb-form-panel">

            <div class="fb-form-header">
                <div class="fb-badge">
                    <span class="fb-badge-dot"></span>
                    Available for Projects
                </div>
                <h1>Get In Touch</h1>
                <p>Have a game project in mind, want to collaborate, give feedback, or just say hi? Drop a message below.</p>
            </div>

            <div class="fb-divider"></div>

            <form action="mailto:nathasandipurti@gmail.com" method="post" enctype="text/plain" id="feedback-form">
                <div class="fb-grid">
                    <div class="fb-field">
                        <label for="fb-name">Your Name</label>
                        <input type="text" id="fb-name" name="Name" required placeholder="John Doe">
                    </div>
                    <div class="fb-field">
                        <label for="fb-email">Email Address</label>
                        <input type="email" id="fb-email" name="Email" required placeholder="john@example.com">
                    </div>
                    <div class="fb-field full">
                        <label for="reason">Reason for Inquiry</label>
                        <select id="reason" name="inquiry_reason" required>
                            <option value="" disabled selected>Select a reason...</option>
                            <option value="general">General Feedback</option>
                            <option value="job">Job Opportunity</option>
                            <option value="question">Academic Question</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="fb-field full">
                        <label for="fb-message">Message / Feedback</label>
                        <textarea id="fb-message" name="Message" rows="7" required placeholder="Type your message here..."></textarea>
                    </div>
                </div>

                <div class="fb-submit-row" style="margin-top: 20px;">
                    <span class="fb-submit-note">Replies within 24–48 hours</span>
                    <button type="submit" class="fb-submit-btn">
                        Send Message
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>

        <!-- RIGHT: Artwork Panel -->
        <div class="fb-image-panel">
            <img src="../assets/images/backgrounds/feedback_art.jpg"
                 onerror="this.src='../assets/images/backgrounds/new_education_bg.png'"
                 alt="Night mountain landscape with fire lookout tower">

            <div class="fb-image-caption">
                <h3>Nathanieal Sandipurti</h3>
                <p>Game Developer &amp; Creator · B.E. Computer Engineering</p>
                <div class="fb-contact-chips">
                    <a href="mailto:nathasandipurti@gmail.com" class="fb-chip">
                        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                        nathasandipurti@gmail.com
                    </a>
                    <a href="https://github.com/Nathanieal06" target="_blank" rel="noopener" class="fb-chip">
                        <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                        GitHub
                    </a>
                    <a href="https://www.linkedin.com/in/nathanieal-sandipurti/" target="_blank" rel="noopener" class="fb-chip">
                        <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
                        LinkedIn
                    </a>
                </div>
            </div>
        </div>

    </main>

    <!-- Custom Cursor -->
    <div id="custom-crosshair"></div>

    <script src="../assets/js/script.js"></script>
</body>
</html>
