<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Extra Curricular Activities</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a0a1e;
            --coral-accent: #e8816a;
        }
        body { 
            background-color: var(--bg-dark); 
            color: #FEDCC8; 
            font-family: 'Jost', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        h1 { 
            font-weight: 300; 
            letter-spacing: 4px; 
            text-transform: uppercase;
            font-size: 3rem;
            margin-bottom: 10px;
        }
        p {
            font-weight: 300;
            color: rgba(254, 220, 200, 0.8);
            margin-bottom: 30px;
            text-align: center;
            max-width: 600px;
            line-height: 1.6;
            font-size: 1.1rem;
        }
        a.back-btn { 
            display: inline-block; 
            padding: 12px 28px; 
            color: var(--bg-dark); 
            background: var(--coral-accent); 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        a.back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(238, 120, 110, 0.3);
            color: #fff;
        }
    </style>
</head>
<body>
    <h1>Extra Curricular</h1>
    <p>Outside of academic and professional Game Development, I frequently engage in community building, writing, and physical activities that keep the creative forge burning bright.</p>

</body>
</html>
